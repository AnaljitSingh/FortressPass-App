<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Dark background -->
  <rect width="100" height="100" fill="#1A1C1E" rx="12"/>
  
  <!-- Shield shape -->
  <path d="M50 8 L82 22 L82 52 C82 70 67 84 50 92 C33 84 18 70 18 52 L18 22 Z" 
        fill="#1A1C1E" stroke="#D4AF37" stroke-width="3"/>
  
  <!-- Shield inner fill -->
  <path d="M50 15 L76 27 L76 52 C76 67 63 79 50 86 C37 79 24 67 24 52 L24 27 Z" 
        fill="#0D0E10"/>
  
  <!-- Gold accent top bar (battlements) -->
  <rect x="34" y="27" width="6" height="8" fill="#D4AF37" rx="1"/>
  <rect x="44" y="24" width="6" height="11" fill="#D4AF37" rx="1"/>
  <rect x="54" y="24" width="6" height="11" fill="#D4AF37" rx="1"/>
  <rect x="60" y="27" width="6" height="8" fill="#D4AF37" rx="1"/>
  
  <!-- Central keyhole -->
  <circle cx="50" cy="54" r="8" fill="none" stroke="#D4AF37" stroke-width="2.5"/>
  <rect x="47" y="57" width="6" height="10" fill="#D4AF37" rx="1"/>
  
  <!-- Gold bottom shine line -->
  <path d="M32 72 Q50 78 68 72" fill="none" stroke="#D4AF37" stroke-width="1.5" opacity="0.5"/>
</svg>