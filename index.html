<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Citadel PWA Protocols -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Citadel">
    <link rel="apple-touch-icon" href="/icon.png">
    
    <!-- Core UI Engines -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Newsreader:opsz,wght@6..72,400;500;600;700&family=JetBrains+Mono:wght@400;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              charcoal: '#1A1C1E',
              gold: '#D4AF37',
              parchment: '#F5F5DC',
            }
          }
        }
      }
    </script>

    <style>
      .material-symbols-outlined {
        font-family: 'Material Symbols Outlined';
        font-weight: normal;
        font-style: normal;
        font-size: 24px;
        line-height: 1;
        letter-spacing: normal;
        text-transform: none;
        display: inline-block;
        white-space: nowrap;
        word-wrap: normal;
        direction: ltr;
        -webkit-font-feature-settings: 'liga';
        -webkit-font-smoothing: antialiased;
      }
    </style>

    <title>FortressPass | Heritage Security</title>
  </head>
  <body class="bg-[#1A1C1E]">
    <div id="root">
      <!-- Fail-safe Loading / Repair Screen -->
      <div id="citadel-loader" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; background: #1A1C1E; font-family: 'Newsreader', serif;">
        <div style="width: 50px; height: 50px; border: 2px solid #D4AF37; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <p style="color: #D4AF37; margin-top: 20px; letter-spacing: 0.2em; font-size: 12px; text-transform: uppercase;">Initializing Citadel Protocol...</p>
        
        <div id="repair-module" style="display: none; margin-top: 30px; text-align: center;">
          <p style="color: #64748b; font-size: 10px; margin-bottom: 15px;">INITIALIZATION DELAY DETECTED</p>
          <button onclick="repairCitadel()" style="background: transparent; border: 1px solid #735C00; color: #D4AF37; padding: 10px 20px; font-size: 11px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.1em; transition: all 0.3s;">Repair & Force Reload</button>
        </div>
      </div>
    </div>
    
    <script>
      // Fail-safe logic
      setTimeout(() => {
        const root = document.getElementById('root');
        // If React hasn't replaced the loader after 4 seconds, show repair module
        if (document.getElementById('citadel-loader')) {
          const repair = document.getElementById('repair-module');
          if (repair) repair.style.display = 'block';
        }
      }, 4000);

      function repairCitadel() {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(registrations => {
            for(let registration of registrations) {
              registration.unregister();
            }
          });
        }
        caches.keys().then(names => {
          for (let name of names) caches.delete(name);
        });
        window.location.reload(true);
      }

      // Pre-check for browser compatibility
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        console.error('Citadel Core Error:', msg, error);
        return false;
      };
    </script>

    <style>
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
